name: cogniops
description: CogniOps – AI Teammate for Cloud Builders
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  http: ^1.1.0
  google_fonts: ^6.1.0
  fl_chart: ^0.66.0
  intl: ^0.18.1
  shimmer: ^3.0.0
  record: ^6.0.0
  permission_handler: ^11.3.1
  flutter_markdown: ^0.7.3
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true